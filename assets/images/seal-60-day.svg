<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="sealBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF3C2"/>
      <stop offset="55%" stop-color="#F7C417"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <path id="topArc" d="M 30,80 A 50,50 0 0 1 130,80"/>
    <path id="botArc" d="M 30,82 A 50,50 0 0 0 130,82"/>
  </defs>
  <!-- Anel externo branco -->
  <circle cx="80" cy="80" r="78" fill="#FFFFFF"/>
  <!-- Disco dourado principal -->
  <circle cx="80" cy="80" r="72" fill="url(#sealBg)" stroke="#8E6C0A" stroke-width="2"/>
  <!-- Anel interno -->
  <circle cx="80" cy="80" r="56" fill="none" stroke="rgba(11,11,11,0.25)" stroke-width="1.5"/>
  <!-- Texto curvo superior -->
  <text font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0E0D11" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">100% SATISFACTION</textPath>
  </text>
  <!-- Texto curvo inferior -->
  <text font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0E0D11" letter-spacing="2">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">GUARANTEED</textPath>
  </text>
  <!-- Estrelas decorativas -->
  <g fill="#0E0D11">
    <circle cx="32" cy="80" r="2"/>
    <circle cx="128" cy="80" r="2"/>
  </g>
  <!-- 60 grande -->
  <text x="80" y="84" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#0E0D11" text-anchor="middle">60</text>
  <!-- DAYS embaixo -->
  <text x="80" y="103" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#0E0D11" text-anchor="middle" letter-spacing="2">DAYS</text>
</svg>
